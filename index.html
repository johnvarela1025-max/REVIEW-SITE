<!DOCTYPE html>
<html>
<head>
  <title>Review Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 25px;
      max-width: 500px;
      margin: auto;
      background: #f7f7f7;
      color: #111;
    }

    .company-name {
      text-align: center;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .card {
      background: white;
      padding: 24px;
      margin-top: 18px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 26px;
      text-align: center;
      margin-top: 0;
    }

    textarea {
      width: 100%;
      height: 155px;
      font-size: 16px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button, a {
      display: block;
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      color: white;
      text-align: center;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      box-sizing: border-box;
    }

    .green-btn {
      background: #1db954;
    }

    .blue-btn {
      background: #0b57d0;
    }

    .note {
      font-size: 14px;
      color: #555;
      margin-top: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="company-name" id="businessName">Loading...</div>

  <div class="card">
    <h1>Leave Us a Google Review</h1>

    <p>Here’s a suggested review. Please edit it so it matches your real experience.</p>

    <textarea id="reviewText"></textarea>

    <button class="green-btn" onclick="generateReview()">Generate New Review</button>

    <button class="blue-btn copy-btn" onclick="copyReview()">Copy Suggested Review</button>

    <a id="googleReviewLink" class="green-btn" target="_blank" onclick="trackClick()">
      Open Google Review Page
    </a>

    <p class="note">
      Please only leave an honest review based on your real experience.
    </p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
      authDomain: "envisionedmktng.firebaseapp.com",
      projectId: "envisionedmktng",
      storageBucket: "envisionedmktng.firebasestorage.app",
      messagingSenderId: "1075132261537",
      appId: "1:1075132261537:web:2c283114b82d1cee4efce0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const employeeId = params.get("employee");

    const businesses = [
      { name: "Business One", link: "PASTE GOOGLE REVIEW LINK HERE" },
      { name: "Business Two", link: "PASTE GOOGLE REVIEW LINK HERE" },
      { name: "Business Three", link: "PASTE GOOGLE REVIEW LINK HERE" }
    ];

    let currentBusiness = null;

    function random(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    async function updateStat(field) {
      if (!employeeId) return;

      try {
        await updateDoc(doc(db, "employees", employeeId), {
          [field]: increment(1)
        });
      } catch (e) {}
    }

    function pickRandomBusiness() {
      currentBusiness = random(businesses);

      document.getElementById("businessName").innerText = currentBusiness.name;
      document.getElementById("googleReviewLink").href = currentBusiness.link;

      generateReview();
      updateStat("scans");
    }

    const openings = [
      "I had a great experience with",
      "I really enjoyed my visit to",
      "I had an amazing experience at",
      "I’m very satisfied with",
      "My experience with",
      "I recently visited"
    ];

    const serviceWords = [
      "service was excellent",
      "staff was very professional",
      "team was extremely helpful",
      "customer service was top tier",
      "experience was smooth and easy",
      "staff was friendly and welcoming"
    ];

    const positives = [
      "everything was handled perfectly",
      "they took great care of me",
      "the process was fast and simple",
      "I felt valued as a customer",
      "they exceeded my expectations",
      "everything was organized and efficient"
    ];

    const endings = [
      "I would definitely recommend them.",
      "I’ll definitely be coming back.",
      "Highly recommend to anyone.",
      "I’d gladly use them again.",
      "Great experience overall.",
      "Definitely worth it."
    ];

    window.generateReview = function () {
      if (!currentBusiness) return;

      const review = `${random(openings)} ${currentBusiness.name}. Their ${random(serviceWords)} and ${random(positives)}. ${random(endings)}`;
      document.getElementById("reviewText").value = review;
    };

    window.copyReview = async function () {
      const text = document.getElementById("reviewText").value;

      try {
        await navigator.clipboard.writeText(text);

        const btn = document.querySelector(".copy-btn");
        btn.innerText = "Copied ✓";

        setTimeout(() => {
          btn.innerText = "Copy Suggested Review";
        }, 1500);

        await updateStat("copiedReviews");

      } catch (err) {
        alert("Copy failed. Try again.");
      }
    };

    window.trackClick = async function () {
      await updateStat("reviewClicks");
    };

    pickRandomBusiness();
  </script>

</body>
</html>
