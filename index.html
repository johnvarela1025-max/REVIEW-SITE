<!DOCTYPE html>
<html>
<head>
  <title>Review Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --green: #19b85b;
      --blue: #0b57d0;
      --dark: #101114;
      --muted: #666;
      --bg: #f5f5f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      max-width: 520px;
      margin: auto;
      background: var(--bg);
      color: var(--dark);
    }

    .brand {
      text-align: center;
      font-size: 13px;
      letter-spacing: 3px;
      font-weight: 800;
      color: #777;
      margin: 12px 0 18px;
      text-transform: uppercase;
    }

    .card {
      background: #fff;
      padding: 26px;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0,0,0,.10);
    }

    h1 {
      font-size: 30px;
      text-align: center;
      margin: 0 0 18px;
      line-height: 1.1;
    }

    p {
      font-size: 16px;
      line-height: 1.45;
    }

    textarea {
      width: 100%;
      height: 170px;
      font-size: 16px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #ccc;
      resize: none;
    }

    button, a {
      display: block;
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      color: white;
      text-align: center;
      border: 0;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .green {
      background: var(--green);
    }

    .blue {
      background: var(--blue);
    }

    .note {
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      margin-top: 16px;
    }

    .small {
      font-size: 13px;
      color: #777;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="brand" id="businessName">Loading...</div>

  <div class="card">
    <h1>Leave Us a Google Review</h1>

    <p>Here’s a suggested review. Please edit it so it matches your real experience.</p>

    <textarea id="reviewText" placeholder="Generating review..."></textarea>

    <button class="green" onclick="generateReview()">Generate New Review</button>
    <button class="blue copy-btn" onclick="copyReview()">Copy Suggested Review</button>

    <a id="googleReviewLink" class="green" href="#" onclick="openGoogleReview(event)">
      Open Google Review Page
    </a>

    <p class="note">Please only leave an honest review based on your real experience.</p>
    <p class="small" id="employeeTag"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const employeeId = params.get("employee") || "default";

    document.getElementById("employeeTag").innerText = "Tracking ID: " + employeeId;

    const businesses = [
      {
        name: "Wholesome House Cleaning of Ocala",
        industry: "cleaning company",
        link: "https://www.google.com/search?q=Wholesome+House+Cleaning+of+Ocala+reviews"
      },
      {
        name: "Wholesome House Cleaning of Sarasota",
        industry: "cleaning company",
        link: "https://www.google.com/search?q=Wholesome+House+Cleaning+of+Sarasota+reviews"
      },
      {
        name: "Wholesome House Cleaning of Lakewood Ranch",
        industry: "cleaning company",
        link: "https://www.google.com/search?q=Wholesome+House+Cleaning+of+Lakewood+Ranch+reviews"
      },
      {
        name: "Wholesome House Cleaning of Bradenton",
        industry: "cleaning company",
        link: "https://www.google.com/search?q=Wholesome+House+Cleaning+of+Bradenton+reviews"
      }
    ];

    let currentBusiness = null;

    function random(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    const reviewStyles = {
      "cleaning company": {
        openings: [
          "I had a great experience with",
          "I was really happy with the service from",
          "Thank you so much for the great work from",
          "My experience with",
          "I recently used",
          "I am so amazed by"
        ],
        details: [
          "the team was professional, detailed, and left everything looking fresh",
          "the service was thorough and the results were amazing",
          "everything was handled with care and looked great afterward",
          "they made the whole process simple and the results were exactly what I needed"
        ],
        endings: [
          "I would definitely recommend them.",
          "I’d gladly use them again.",
          "Great service from start to finish.",
          "I appreciate the care they put into their work."
        ]
      }
    };

    function saveLocalStat(type) {
      const key = "reviewStats_" + employeeId;
      const stats = JSON.parse(localStorage.getItem(key)) || {
        scans: 0,
        uniqueScans: 0,
        copiedReviews: 0,
        reviewClicks: 0
      };

      stats[type] = (stats[type] || 0) + 1;
      localStorage.setItem(key, JSON.stringify(stats));
    }

    function trackScan() {
      saveLocalStat("scans");

      const uniqueKey = "uniqueScan_" + employeeId;

      if (!localStorage.getItem(uniqueKey)) {
        saveLocalStat("uniqueScans");
        localStorage.setItem(uniqueKey, "true");
      }
    }

    function generateReview() {
      if (!currentBusiness) return;

      const style = reviewStyles[currentBusiness.industry];

      const review =
        random(style.openings) + " " +
        currentBusiness.name + ". " +
        random(style.details) + ". " +
        random(style.endings);

      document.getElementById("reviewText").value = review;
    }

    function copyReview() {
      const text = document.getElementById("reviewText").value;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function () {
          const btn = document.querySelector(".copy-btn");
          btn.innerText = "Copied ✓";

          setTimeout(function () {
            btn.innerText = "Copy Suggested Review";
          }, 1500);

          saveLocalStat("copiedReviews");
        });
      } else {
        alert("Hold down on the review text and copy it manually.");
      }
    }

    function openGoogleReview(event) {
      event.preventDefault();

      if (!currentBusiness || !currentBusiness.link) return;

      saveLocalStat("reviewClicks");

      window.open(currentBusiness.link, "_blank");
    }

    function start() {
      currentBusiness = random(businesses);

      document.getElementById("businessName").innerText = currentBusiness.name;
      document.getElementById("googleReviewLink").href = currentBusiness.link;

      generateReview();
      trackScan();
    }

    start();
  </script>

</body>
</html>
