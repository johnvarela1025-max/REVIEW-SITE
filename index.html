<!DOCTYPE html>
<html>
<head>
  <title>ENVISIONED MARKETING Review Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #111;
      padding: 20px;
    }

    .box {
      max-width: 520px;
      margin: 35px auto;
      background: white;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .brand {
      text-align: center;
      font-size: 13px;
      letter-spacing: 2px;
      font-weight: bold;
      color: #777;
      margin-bottom: 15px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .businessBox {
      background: #f4f4f4;
      padding: 15px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: center;
    }

    #businessName {
      font-size: 22px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      height: 170px;
      padding: 14px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button, a {
      display: block;
      width: 100%;
      padding: 15px;
      margin-top: 14px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      box-sizing: border-box;
    }

    .secondary {
      background: #eee;
      color: #111;
      border: 1px solid #ddd;
    }

    .note {
      font-size: 13px;
      color: #777;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="brand">ENVISIONED MARKETING</div>

    <h1>Leave a Google Review</h1>

    <div class="businessBox">
      <p>You were matched with:</p>
      <div id="businessName">Loading...</div>
    </div>

    <p>Here’s a suggested review. Please edit it so it matches your real experience.</p>

    <textarea id="reviewText"></textarea>

    <button onclick="generateReview()">Generate New Review</button>
    <button onclick="copyReview()">Copy Review</button>

    <a id="googleReviewLink" target="_blank" onclick="trackReviewClick()">Open Google Review Page</a>

    <button class="secondary" onclick="pickRandomBusiness()">Show Another Company</button>

    <p class="note">
      Please only leave an honest review for a business you actually visited or received service from.
    </p>
  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      increment
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


    // 🔥 REPLACE THIS WITH YOUR REAL FIREBASE CONFIG
    const firebaseConfig = {
  apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
  authDomain: "envisionedmktng.firebaseapp.com",
  projectId: "envisionedmktng",
  storageBucket: "envisionedmktng.firebasestorage.app",
  messagingSenderId: "1075132261537",
  appId: "1:1075132261537:web:2c283114b82d1cee4efce0",
  measurementId: "G-8XY38GQQ86"
};


    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);


    // 🔥 ADD YOUR BUSINESSES HERE
    const businesses = [
      {
        id: "business-one",
        name: "Business One",
        link: "PASTE GOOGLE REVIEW LINK HERE"
      },
      {
        id: "business-two",
        name: "Business Two",
        link: "PASTE GOOGLE REVIEW LINK HERE"
      },
      {
        id: "business-three",
        name: "Business Three",
        link: "PASTE GOOGLE REVIEW LINK HERE"
      }
    ];


    let currentBusiness = null;

    const urlParams = new URLSearchParams(window.location.search);
    const employeeId = urlParams.get("employee");


    const openings = [
      "I had a great experience with",
      "I really enjoyed my visit to",
      "I had an amazing experience at",
      "I’m very satisfied with",
      "My experience with",
      "I recently visited",
      "I was really impressed with"
    ];

    const serviceWords = [
      "service was excellent",
      "staff was very professional",
      "team was extremely helpful",
      "customer service was top tier",
      "experience was smooth and easy",
      "staff was friendly and welcoming",
      "communication was clear"
    ];

    const positives = [
      "everything was handled perfectly",
      "they took great care of me",
      "the process was fast and simple",
      "I felt valued as a customer",
      "they exceeded my expectations",
      "everything was organized and efficient"
    ];

    const endings = [
      "I would definitely recommend them.",
      "I’ll definitely be coming back.",
      "Highly recommend to anyone.",
      "I’d gladly use them again.",
      "Great experience overall.",
      "Definitely worth it."
    ];


    function random(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }


    async function updateEmployeeStat(fieldName) {
      if (!employeeId) return;

      const employeeRef = doc(db, "employees", employeeId);
      const employeeSnap = await getDoc(employeeRef);

      if (!employeeSnap.exists()) {
        await setDoc(employeeRef, {
          uid: employeeId,
          scans: 0,
          copiedReviews: 0,
          reviewClicks: 0,
          createdAt: new Date().toISOString()
        });
      }

      await updateDoc(employeeRef, {
        [fieldName]: increment(1)
      });
    }


    async function pickRandomBusiness() {
      currentBusiness = random(businesses);

      document.getElementById("businessName").innerText = currentBusiness.name;
      document.getElementById("googleReviewLink").href = currentBusiness.link;

      generateReview();

      await updateEmployeeStat("scans");
    }


    window.generateReview = function () {
      if (!currentBusiness) return;

      const review = `${random(openings)} ${currentBusiness.name}. Their ${random(serviceWords)} and ${random(positives)}. ${random(endings)}`;

      document.getElementById("reviewText").value = review;
    };


    window.copyReview = async function () {
      const text = document.getElementById("reviewText");

      text.select();
      text.setSelectionRange(0, 99999);

      await navigator.clipboard.writeText(text.value);

      await updateEmployeeStat("copiedReviews");

      alert("Review copied!");
    };


    window.trackReviewClick = async function () {
      await updateEmployeeStat("reviewClicks");
    };


    pickRandomBusiness();

  </script>

</body>
</html>
