<!DOCTYPE html>
<html>
<head>
  <title>ENVISIONED MARKETING Review Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>

<h1>Leave a Google Review</h1>

<p>You were matched with:</p>
<h2 id="businessName">Loading...</h2>

<textarea id="reviewText"></textarea>

<button onclick="generateReview()">Generate Review</button>
<button onclick="copyReview()">Copy Review</button>
<a id="googleReviewLink" target="_blank" onclick="trackClick()">Open Google Review Page</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
  authDomain: "envisionedmktng.firebaseapp.com",
  projectId: "envisionedmktng",
  storageBucket: "envisionedmktng.firebasestorage.app",
  messagingSenderId: "1075132261537",
  appId: "1:1075132261537:web:2c283114b82d1cee4efce0",
  measurementId: "G-8XY38GQQ86"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const employeeId = params.get("employee");

const businesses = [
  {
    name: "Business One",
    link: "PASTE GOOGLE REVIEW LINK HERE"
  },
  {
    name: "Business Two",
    link: "PASTE GOOGLE REVIEW LINK HERE"
  }
];

let currentBusiness = businesses[Math.floor(Math.random() * businesses.length)];

document.getElementById("businessName").innerText = currentBusiness.name;
document.getElementById("googleReviewLink").href = currentBusiness.link;

async function updateStat(field) {
  if (!employeeId) return;

  const ref = doc(db, "employees", employeeId);
  await updateDoc(ref, {
    [field]: increment(1)
  });
}

window.generateReview = function () {
  document.getElementById("reviewText").value =
    `I had a great experience with ${currentBusiness.name}. The service was professional, friendly, and smooth from start to finish.`;
};

window.copyReview = async function () {
  const text = document.getElementById("reviewText");
  text.select();
  await navigator.clipboard.writeText(text.value);
  await updateStat("copiedReviews");
  alert("Review copied!");
};

window.trackClick = async function () {
  await updateStat("reviewClicks");
};

await updateStat("scans");
generateReview();
</script>

</body>
</html>
