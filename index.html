<!DOCTYPE html>
<html>
<head>
  <title>Review Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body { font-family: Arial, sans-serif; padding: 25px; max-width: 500px; margin: auto; background: #f7f7f7; color: #111; }
    .company-name { text-align: center; font-size: 15px; font-weight: bold; letter-spacing: 2px; color: #555; text-transform: uppercase; margin-top: 10px; }
    .card { background: white; padding: 24px; margin-top: 18px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    h1 { font-size: 26px; text-align: center; margin-top: 0; }
    textarea { width: 100%; height: 155px; font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
    button, a { display: block; width: 100%; padding: 15px; margin-top: 15px; color: white; text-align: center; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; text-decoration: none; box-sizing: border-box; }
    .green-btn { background: #1db954; }
    .blue-btn { background: #0b57d0; }
    .note { font-size: 14px; color: #555; margin-top: 14px; text-align: center; }
  </style>
</head>

<body>

  <div class="company-name" id="businessName">Loading...</div>

  <div class="card">
    <h1>Leave Us a Google Review</h1>

    <p>Here’s a suggested review. Please edit it so it matches your real experience.</p>

    <textarea id="reviewText" placeholder="Generating review..."></textarea>

    <button class="green-btn" onclick="generateReview()">Generate New Review</button>
    <button class="blue-btn copy-btn" onclick="copyReview()">Copy Suggested Review</button>

    <a id="googleReviewLink" class="green-btn" href="#" onclick="openGoogleReview(event)">
      Open Google Review Page
    </a>

    <p class="note">Please only leave an honest review based on your real experience.</p>
    <p class="note" id="employeeTag"></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
      authDomain: "envisionedmktng.firebaseapp.com",
      projectId: "envisionedmktng",
      storageBucket: "envisionedmktng.firebasestorage.app",
      messagingSenderId: "1075132261537",
      appId: "1:1075132261537:web:2c283114b82d1cee4efce0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const employeeId = params.get("employee") || "default";
    const businessIdFromUrl = params.get("business");

    document.getElementById("employeeTag").innerText = "Employee Tracking ID: " + employeeId;

    let currentBusiness = null;

    function random(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function slugify(text) {
      return String(text)
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "");
    }

    function getTodayDate() {
      const now = new Date();
      return now.toISOString().split("T")[0];
    }

    function getMonthKey() {
      const now = new Date();
      return now.toISOString().slice(0, 7);
    }

    function getWeekKey() {
      const now = new Date();
      const firstDay = new Date(now.getFullYear(), 0, 1);
      const pastDays = Math.floor((now - firstDay) / 86400000);
      const weekNumber = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
      return now.getFullYear() + "-W" + weekNumber;
    }

    const reviewStyles = {
      "cleaning company": {
        openings: [
          "I had a great experience with",
          "I was really happy with the service from",
          "Thank you so much for the great work from",
          "My experience with",
          "I recently used",
          "I am so amazed by"
        ],
        details: [
          "the team was professional, detailed, and left everything looking fresh",
          "the service was thorough and the results were amazing",
          "everything was handled with care and looked great afterward",
          "they made the whole process simple and the results were exactly what I needed"
        ],
        endings: [
          "I would definitely recommend them.",
          "I’d gladly use them again.",
          "Great service from start to finish.",
          "I appreciate the care they put into their work."
        ]
      },

      default: {
        openings: [
          "I had a great experience with",
          "I really appreciated the service from",
          "My experience with",
          "I recently worked with"
        ],
        details: [
          "the team was professional, helpful, and made everything easy",
          "the service was smooth, the staff was friendly, and everything was handled well",
          "they were easy to work with, professional, and made the process simple"
        ],
        endings: [
          "I would definitely recommend them.",
          "I’d gladly use them again.",
          "Great experience overall."
        ]
      }
    };

    async function loadBusiness() {
      try {
        if (businessIdFromUrl) {
          const docRef = await db.collection("businesses").doc(businessIdFromUrl).get();

          if (!docRef.exists) {
            document.getElementById("businessName").innerText = "Business Not Found";
            document.getElementById("reviewText").value = "No business found for: " + businessIdFromUrl;
            return;
          }

          currentBusiness = {
            id: docRef.id,
            ...docRef.data()
          };

          if (!currentBusiness.reviewLink) {
            document.getElementById("businessName").innerText = currentBusiness.name || "Missing Review Link";
            document.getElementById("reviewText").value = "This business is missing a Google review link.";
            return;
          }

          startReviewPage();
          return;
        }

        const snapshot = await db.collection("businesses").get();

        const businesses = snapshot.docs
          .map(doc => ({ id: doc.id, ...doc.data() }))
          .filter(b => b.active !== false && b.reviewLink);

        if (!businesses.length) {
          document.getElementById("businessName").innerText = "No Businesses Found";
          document.getElementById("reviewText").value = "Add businesses in admin.html first.";
          return;
        }

        currentBusiness = random(businesses);
        startReviewPage();

      } catch (error) {
        document.getElementById("businessName").innerText = "Firebase Error";
        document.getElementById("reviewText").value = error.message;
      }
    }

    async function logActivity(type) {
      if (!currentBusiness) return;

      const businessId = currentBusiness.id || slugify(currentBusiness.name);

      try {
        await db.collection("activityLogs").add({
          type: type,
          employeeId: employeeId,
          businessId: businessId,
          businessName: currentBusiness.name,
          industry: currentBusiness.industry || "default",
          date: getTodayDate(),
          week: getWeekKey(),
          month: getMonthKey(),
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } catch (error) {
        console.log("Activity log error:", error.message);
      }
    }

    async function updateStat(type) {
      if (!currentBusiness) return;

      const businessId = currentBusiness.id || slugify(currentBusiness.name);
      const statId = employeeId + "_" + businessId;

      try {
        await db.collection("stats").doc(statId).set({
          employeeId: employeeId,
          businessId: businessId,
          businessName: currentBusiness.name,
          industry: currentBusiness.industry || "default",
          [type]: firebase.firestore.FieldValue.increment(1),
          lastActivity: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

      } catch (error) {
        console.log("Tracking error:", error.message);
      }
    }

    async function trackScan() {
      await updateStat("scans");
      await logActivity("scan");

      const businessId = currentBusiness.id || slugify(currentBusiness.name);
      const uniqueKey = "unique_" + employeeId + "_" + businessId + "_" + getTodayDate();

      if (!localStorage.getItem(uniqueKey)) {
        await updateStat("uniqueScans");
        await logActivity("uniqueScan");
        localStorage.setItem(uniqueKey, "true");
      }
    }

    function generateReview() {
      if (!currentBusiness) return;

      const industry = currentBusiness.industry || "default";
      const style = reviewStyles[industry] || reviewStyles.default;

      const review =
        random(style.openings) + " " +
        currentBusiness.name + ". " +
        random(style.details) + ". " +
        random(style.endings);

      document.getElementById("reviewText").value = review;
    }

    async function copyReview() {
      const text = document.getElementById("reviewText").value;

      try {
        await navigator.clipboard.writeText(text);

        const btn = document.querySelector(".copy-btn");
        btn.innerText = "Copied ✓";

        setTimeout(() => {
          btn.innerText = "Copy Suggested Review";
        }, 1500);

        await updateStat("copiedReviews");
        await logActivity("copy");

      } catch (error) {
        alert("Copy failed. Hold down on the text and copy manually.");
      }
    }

    async function openGoogleReview(event) {
      event.preventDefault();

      if (!currentBusiness || !currentBusiness.reviewLink) return;

      await updateStat("reviewClicks");
      await logActivity("googleClick");

      window.open(currentBusiness.reviewLink, "_blank");
    }

    function startReviewPage() {
      document.getElementById("businessName").innerText = currentBusiness.name;
      document.getElementById("googleReviewLink").href = currentBusiness.reviewLink;

      generateReview();
      trackScan();
    }

    loadBusiness();
  </script>

</body>
</html>
