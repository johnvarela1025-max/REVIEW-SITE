<!DOCTYPE html>
<html>
<head>
  <title>Employee Login | ENVISIONED MARKETING</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    .box { max-width:420px; margin:50px auto; background:white; color:black; padding:25px; border-radius:16px; }
    input { width:100%; padding:14px; margin-top:10px; border-radius:10px; border:1px solid #ccc; }
    button { width:100%; padding:14px; margin-top:12px; border:none; border-radius:10px; background:black; color:white; }
    .secondary { background:#eee; color:#111; }
    .danger { background:#b00020; }
    .message { margin-top:15px; padding:12px; border-radius:10px; display:none; text-align:center; }
    .error { background:#ffe5e5; color:#9b0000; }
    .success { background:#e8ffe8; color:#006600; }
  </style>
</head>

<body>

<div class="box">
  <h2>Employee Login</h2>

  <input id="email" placeholder="Email" />
  <input id="password" placeholder="Password (6+ chars)" type="password" />

  <button onclick="login()">Login</button>
  <button class="secondary" onclick="signup()">Create Account</button>
  <button class="danger" onclick="resetPassword()">Reset Password</button>

  <div id="messageBox" class="message"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAgzDPYlzuht6cFbWGUQgPiHWHkyG-y3yw",
  authDomain: "envisionedmktng.firebaseapp.com",
  projectId: "envisionedmktng",
  storageBucket: "envisionedmktng.firebasestorage.app",
  messagingSenderId: "1075132261537",
  appId: "1:1075132261537:web:2c283114b82d1cee4efce0",
  measurementId: "G-8XY38GQQ86"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showMessage(text, type) {
  const box = document.getElementById("messageBox");
  box.innerText = text;
  box.className = "message " + type;
  box.style.display = "block";
}

async function createProfile(user) {
  const ref = doc(db, "employees", user.uid);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, {
      email: user.email,
      scans: 0,
      copiedReviews: 0,
      reviewClicks: 0
    });
  }
}

window.signup = async () => {
  const email = emailInput();
  const pass = passInput();

  if (pass.length < 6) return showMessage("Password must be 6+ characters", "error");

  try {
    const user = await createUserWithEmailAndPassword(auth, email, pass);
    await createProfile(user.user);
    showMessage("Account created!", "success");
    setTimeout(() => window.location.href="./employee.html", 800);
  } catch (e) {
    showMessage(e.message, "error");
  }
};

window.login = async () => {
  try {
    const user = await signInWithEmailAndPassword(auth, emailInput(), passInput());
    await createProfile(user.user);
    showMessage("Login successful", "success");
    setTimeout(() => window.location.href="./employee.html", 500);
  } catch (e) {
    showMessage(e.message, "error");
  }
};

window.resetPassword = async () => {
  try {
    await sendPasswordResetEmail(auth, emailInput());
    showMessage("Reset email sent", "success");
  } catch (e) {
    showMessage(e.message, "error");
  }
};

function emailInput(){ return document.getElementById("email").value.trim(); }
function passInput(){ return document.getElementById("password").value.trim(); }

</script>

</body>
</html>
